<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – log in</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            max-width: 980px;
            padding: 20px;
            gap: 40px;
        }
        .left {
            flex: 1;
            min-width: 280px;
        }
        .left h1 {
            color: #1877f2;
            font-size: 56px;
            font-weight: bold;
        }
        .left p {
            font-size: 24px;
            line-height: 1.4;
        }
        .right {
            flex: 1;
            min-width: 300px;
        }
        .login-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.1);
        }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 17px;
        }
        .login-box input:focus {
            border-color: #1877f2;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1877f2;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-btn:hover {
            background: #166fe5;
        }
        .forgot {
            display: block;
            text-align: center;
            color: #1877f2;
            margin: 12px 0;
            text-decoration: none;
        }
        .divider {
            border-bottom: 1px solid #dadde1;
            margin: 20px 0;
        }
        .create-btn {
            width: 100%;
            padding: 14px;
            background: #42b72a;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }
        .create-btn:hover {
            background: #36a420;
        }
        .error {
            color: #f02849;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <h1>facebook</h1>
            <p>Facebook helps you connect and share with the people in your life.</p>
        </div>
        <div class="right">
            <div class="login-box">
                <form id="loginForm">
                    <input type="text" id="email" placeholder="Email or phone number">
                    <div id="emailError" class="error">Please enter a valid email.</div>
                    <input type="password" id="password" placeholder="Password">
                    <div id="passwordError" class="error">Please enter your password.</div>
                    <button type="submit" class="login-btn">Log in</button>
                </form>
                <a href="#" class="forgot">Forgotten password?</a>
                <div class="divider"></div>
                <button class="create-btn" onclick="alert('Sign-up page would open.')">Create new account</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value.trim();
            var emailErr = document.getElementById('emailError');
            var passErr = document.getElementById('passwordError');
            emailErr.classList.remove('show');
            passErr.classList.remove('show');

            var valid = true;
            if (!email || email.indexOf('@') === -1) {
                emailErr.classList.add('show');
                valid = false;
            }
            if (!password || password.length < 6) {
                passErr.classList.add('show');
                valid = false;
            }
            if (!valid) return;

            // Simulate login (real would redirect to Facebook OAuth)
            alert('Login successful! Redirecting to Facebook...');
            // window.location.href = 'https://www.facebook.com'; // uncomment for real redirect
        });
    </script>
</body>
  </html>
